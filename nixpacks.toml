[phases.setup]
nixPkgs = ["nodejs_22", "python312", "python312Packages.virtualenv"]

[phases.install]
cmds = [
  "python -m virtualenv /app/.venv",
  "/app/.venv/bin/pip install -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "node railway-start.js"
